<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Planner Pessoal e Financeiro — controle de ganhos, gastos e metas. Tudo salvo no navegador." />
    <title>Planner Pessoal e Financeiro</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #f8fafc;
        color: #1e293b;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
        text-align: center;
      }
      h1 {
        font-size: 1.75rem;
        font-weight: 700;
        margin: 0 0 12px;
        letter-spacing: -0.02em;
      }
      p {
        margin: 0 0 28px;
        color: #64748b;
        font-size: 1rem;
        line-height: 1.5;
        max-width: 360px;
      }
      .btn {
        display: inline-block;
        padding: 14px 32px;
        font-size: 1.0625rem;
        font-weight: 600;
        color: #fff;
        background: linear-gradient(180deg, #2563eb, #1d4ed8);
        border: none;
        border-radius: 14px;
        text-decoration: none;
        cursor: pointer;
        transition: transform 0.1s, box-shadow 0.2s;
        box-shadow: 0 4px 14px rgba(37, 99, 235, 0.35);
      }
      .btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4);
      }
      .btn:active { transform: translateY(0); }
      .qr-section {
        margin-top: 40px;
        padding-top: 28px;
        border-top: 1px solid #e2e8f0;
      }
      .qr-section span {
        display: block;
        font-size: 0.8125rem;
        color: #94a3b8;
        margin-bottom: 12px;
      }
      .qr-section img {
        display: block;
        margin: 0 auto;
        width: 160px;
        height: 160px;
        border-radius: 12px;
        background: #fff;
        padding: 8px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      }
    </style>
  </head>
  <body>
    <h1>Planner Pessoal e Financeiro</h1>
    <p>Controle ganhos, gastos e metas. Tudo fica salvo no seu navegador — use no celular ou no PC.</p>
    <a href="Planner_Pessoal_Financeiro.html" class="btn">Abrir o app</a>
    <div class="qr-section">
      <span>Compartilhe: escaneie o QR code no celular</span>
      <img id="qr" src="" alt="QR Code para abrir o app" width="160" height="160" />
    </div>
    <script>
      (function() {
        var base = location.origin + location.pathname.replace(/\/?index\.html$/, '').replace(/\/?$/, '/');
        var url = base + 'Planner_Pessoal_Financeiro.html';
        document.getElementById('qr').src = 'https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=' + encodeURIComponent(url);
      })();
    </script>
  </body>
</html>
